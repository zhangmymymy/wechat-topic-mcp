# docker-compose.yml
services:
  collector:
    build: .
    command: node dist/collector/index.js
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    env_file: .env
    restart: unless-stopped

  mcp-server:
    build: .
    command: node dist/mcp/index.js
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    env_file: .env
    ports:
      - "3000:3000"
    restart: unless-stopped
