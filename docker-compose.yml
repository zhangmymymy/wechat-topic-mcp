# docker-compose.yml
services:
  gewechat:
    image: gewechat/gewechat
    ports:
      - "2531:2531"
      - "2532:2532"
    volumes:
      - ./data/gewechat:/data
    restart: unless-stopped

  collector:
    build: .
    command: node dist/collector/index.js
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      - gewechat
    env_file: .env
    ports:
      - "3001:3001"
    restart: unless-stopped

  mcp-server:
    build: .
    command: node dist/mcp/index.js
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    env_file: .env
    ports:
      - "3000:3000"
    restart: unless-stopped
