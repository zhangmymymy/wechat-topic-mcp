sync:
  wechat_data_dir: "${HOME}/Library/Containers/com.tencent.xinWeChat/Data/Documents/xwechat_files"
  decrypt_output_dir: "./data/decrypted"
  keys_file: "./data/wechat_keys.json"
  cron: "*/30 * * * *"

database:
  type: "sqlite"
  path: "./data/wechat.db"

ai:
  provider: "openai"
  api_key: "${OPENAI_API_KEY}"
  # base_url: "https://api.example.com/v1"
  model: "gpt-5.4"
  max_context_messages: 200

notify:
  telegram:
    bot_token: "${TG_BOT_TOKEN}"
    chat_id: "${TG_CHAT_ID}"
  slack:
    bot_token: "${SLACK_BOT_TOKEN}"
    channel: "${SLACK_CHANNEL}"

analysis:
  context_before: 5
  context_after: 10
  cooldown_minutes: 30

retention:
  messages_days: 90
  reports_days: 365
  cleanup_cron: "0 3 * * *"

mcp:
  port: 3000
